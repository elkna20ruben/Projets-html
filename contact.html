<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NovaTech - Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">NovaTech</div>
    <nav aria-label="Navigation principale">
      <ul>
        <li><a href="index.html">Accueil</a></li>
        <li><a href="about.html">À propos</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html" aria-current="page">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="page-titre">
      <h1>Contactez-nous</h1>
      <p>Une question, un projet ? Écrivez-nous, notre équipe vous répondra rapidement.</p>
    </section>

    <section class="contact-form">
      <form action="#" method="post">
        <div class="form-group">
          <label for="nom">Nom complet *</label>
          <input type="text" id="nom" name="nom" required placeholder="Votre nom">
        </div>

        <div class="form-group">
          <label for="email">Adresse email *</label>
          <input type="email" id="email" name="email" required placeholder="vous@exemple.com">
        </div>

        <div class="form-group">
          <label for="telephone">Téléphone</label>
          <input type="tel" id="telephone" name="telephone" placeholder="+241 00 00 00 00" pattern="[0-9+ ]{8,15}">
        </div>

        <div class="form-group">
          <label for="sujet">Sujet *</label>
          <select id="sujet" name="sujet" required>
            <option value="">-- Choisissez un sujet --</option>
            <option value="devis">Demande de devis</option>
            <option value="support">Support technique</option>
            <option value="partenariat">Partenariat</option>
            <option value="autre">Autre</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Message *</label>
          <textarea id="message" name="message" rows="6" required placeholder="Votre message..."></textarea>
        </div>

        <div class="form-group checkbox-group">
          <input type="checkbox" id="rgpd" name="rgpd" required>
          <label for="rgpd">J'accepte que mes données soient utilisées pour être recontacté(e)</label>
        </div>

        <button type="submit">Envoyer le message</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 NovaTech - Tous droits réservés</p>
  </footer>

</body>
</html>
